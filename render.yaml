# Render Blueprint untuk SeqFyre.
# Hubungkan repo GitHub ke Render lalu pilih "New > Blueprint".
services:
  - type: web
    name: seqfyre
    runtime: python
    plan: free
    buildCommand: "pip install -r requirements.txt"
    startCommand: "gunicorn app:app --bind 0.0.0.0:$PORT --workers 2 --timeout 120"
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.3
